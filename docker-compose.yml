services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cuorpugnale
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - ADDR=:8080
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/healthz",
        ]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
